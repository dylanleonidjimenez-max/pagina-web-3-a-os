<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Romántico</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 0;
    }

    /* Menú */
    nav {
      position: fixed;   /* 👈 menú fijo arriba */
      top: 0;
      width: 100%;
      background-color: #ff4d6d;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      z-index: 1000; /* asegura que quede encima */
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffe0ec;
    }

    /* Contenedor portada + perfil */
    .perfil {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 120px auto; /* 👈 baja todo el perfil para que no se tape con el menú */
      text-align: center;
    }

    .portada {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 0 0 15px 15px;
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
    }

    .foto-perfil {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* Galería */
    .galeria {
      margin-top: 100px; /* espacio debajo de la foto de perfil */
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .galeria img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
      transition: transform 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Menú -->
  <nav>
    <a href="index.html">Inicio</a>
    <a href="principal.html">Galería</a>
    <a href="sobre.html">Sobre Nosotros</a>
    <a href="contacto.html">Contacto</a>
  </nav>

  <!-- Perfil -->
  <div class="perfil">
    <img src="img/03.jpeg" alt="Portada" class="portada">
    <img src="img/01.jpeg" alt="Perfil" class="foto-perfil">
  </div>

  <!-- Galería -->
  <div class="galeria">
    <img src="img/02.jpeg" alt="Foto 1">
    <img src="img/05.jpeg" alt="Foto 2">
    <img src="img/06.jpeg" alt="Foto 3">
    <img src="img/07.jpeg" alt="Foto 4">

    <img src="img/08.jpeg" alt="Foto 5">
    <img src="img/04.jpeg" alt="Foto 6">
    <img src="img/10.jpeg" alt="Foto 7">
    <img src="img/11.jpeg" alt="Foto 8">
  </div>

</body>
</html>
