<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Amor</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }
    .formulario {
      background: #fff0f5;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
      text-align: center;
      width: 300px;
    }
    h2 {
      color: #e75480;
      margin-bottom: 20px;
    }
    input {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: 2px solid #ffb6c1;
      border-radius: 8px;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #e75480;
    }
    .error {
      margin-top: 10px;
      font-size: 0.9em;
    }
    /* Decoración con corazones */
    body::before {
      content: "❤ ❤ ❤";
      position: absolute;
      top: 20px;
      font-size: 2em;
      color: #ff69b4;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="formulario">
    <h2>💖 Iniciar seción 💖</h2>
    <form id="registroForm">
      <input type="text" id="usuario" placeholder="Tu nombre" required>
      <input type="password" id="password" placeholder="Contraseña secreta" required>
      <button type="submit">Entrar al corazón</button>
      <p id="mensaje" class="error"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById('registroForm');
    const mensaje = document.getElementById('mensaje');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value;
      const password = document.getElementById('password').value;

      if(usuario === "dalay" && password === "30052023") {
        mensaje.style.color = "green";
        mensaje.textContent = "Acceso concedido 💕 ¡Feliz aniversario!";
        // Redirigir a otra página especial
          window.location.href = "menu.html";
      } else {
        mensaje.style.color = "red";
        mensaje.textContent = "Ups... datos incorrectos 💔";
      }
    });
  </script>
</body>
</html>
